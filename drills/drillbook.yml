app:
  name: ekoa
  url: http://localhost:3000
fullDrill: false
autonomy: gated
viewports:
  - desktop
  - mobile
globalRules: >-
  Default to PT-PT visible copy. Every page must produce zero browser console
  errors. Preserve the shared dashboard chrome and S1 design system across
  authenticated surfaces, respect role-gated behavior, and never fake a state
  that cannot be reached through the real UI.
dispatch: manual
pages:
  - id: login
    title: Login
    path: /login
    mode: steps
    selected: true
  - id: activate
    title: Activate - authorize a CLI/TUI device login
    path: /activate
    mode: steps
    selected: true
