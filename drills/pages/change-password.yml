id: change-password
title: Change password
path: /change-password
mode: steps
areas: []
steps:
  - id: card-and-heading-render
    area: 0
    mode: vision
    enabled: true
    viewports: [desktop, mobile]
    state: default
    description: 'The page is a standalone auth-style screen (NOT wrapped in the shared dashboard PageShell/Sidebar/Header) - a white rounded card with testid "change-password-card" is centered on a dark teal-950 backdrop with a faint large hexagon outline watermark and a soft amber glow behind it; inside the card, a teal ShieldCheck icon sits above an h1 reading "Alterar Palavra-passe" rendered in the Lora serif font, and a version tagline "Ekoa · Plataforma de trabalho com IA" appears centered below the card.'
    tags: [visual]
    judgment: false
  - id: subtitle-voluntary
    area: 0
    mode: vision
    enabled: true
    viewports: [desktop, mobile]
    state: default
    description: 'When reached voluntarily while already authenticated (passwordChangeRequired false), the subtitle directly under the h1 reads exactly "Atualize a palavra-passe da sua conta" in neutral gray text.'
    tags: []
    judgment: false
  - id: subtitle-forced
    area: 0
    mode: vision
    enabled: true
    viewports: [desktop, mobile]
    state: forced
    description: 'In the forced state, the subtitle instead reads "Deve alterar a palavra-passe antes de continuar" rendered in amber text, replacing the default neutral copy - signalling the change is mandatory before continuing.'
    tags: []
    judgment: false
  - id: three-password-fields-and-toggle
    area: 0
    mode: e2e
    enabled: true
    viewports: [desktop, mobile]
    state: default
    description: 'The form has exactly three labeled password fields in this order - "Palavra-passe Atual" (current), "Nova Palavra-passe" (new), "Confirmar Nova Palavra-passe" (confirm) - each prefixed with a lock icon; each field has a right-side eye/eye-off toggle button (aria-label "Mostrar palavra-passe" / "Ocultar palavra-passe") that switches that field between masked and plain text when clicked, independently of the other two fields.'
    tags: []
    judgment: false
  - id: strength-meter-live
    area: 0
    mode: vision
    enabled: true
    viewports: [desktop, mobile]
    state: default
    description: 'Typing into the new-password field reveals a 5-segment strength bar plus a label to its right that update live as the value changes - e.g. a short lowercase-only value like "abc" shows the red "Fraca" label with few segments filled, while a long mixed-case+number+symbol value like "Abcdef123!@#" shows the green "Forte" label with all segments filled; the meter and label are absent while the field is empty.'
    tags: [validation]
    judgment: false
  - id: requirements-checklist-live
    area: 0
    mode: vision
    enabled: true
    viewports: [desktop, mobile]
    state: default
    description: 'Once the new-password field is non-empty, a 4-item checklist appears below the confirm field - "Pelo menos 8 caracteres", "Uma letra maiuscula", "Uma letra minuscula", "Um numero" - each item toggling live from a gray X icon to a teal check icon as the typed password satisfies that specific rule.'
    tags: [validation]
    judgment: false
  - id: confirm-mismatch-inline-error
    area: 0
    mode: vision
    enabled: true
    viewports: [desktop, mobile]
    state: default
    description: 'Typing a new password and then a different value into the confirm-password field shows an inline red error "As palavras-passe não coincidem" directly under the confirm field with its border turned red; the error disappears as soon as both fields hold the exact same value.'
    tags: [validation]
    judgment: false
  - id: submit-disabled-until-valid
    area: 0
    mode: e2e
    enabled: true
    viewports: [desktop, mobile]
    state: default
    description: 'The "Atualizar Palavra-passe" submit button stays disabled while current-password is empty, or any of the 4 new-password requirements is unmet, or confirm-password does not match the new password; it only becomes clickable once current-password is non-empty, all 4 requirements are met, and confirm-password matches new-password exactly.'
    tags: [validation]
    judgment: false
  - id: same-password-rejected
    area: 0
    mode: e2e
    enabled: true
    viewports: [desktop, mobile]
    state: default
    description: 'Submitting the form with an identical current-password and new-password value (e.g. both "Abcdefg1") shows a red error banner reading exactly "A nova palavra-passe deve ser diferente da atual" above the form; this is caught client-side before any network request, so no success message ever appears for this input.'
    tags: [validation]
    judgment: false
  - id: wrong-current-password-error
    area: 0
    mode: e2e
    enabled: true
    viewports: [desktop, mobile]
    state: default
    description: 'Submitting a deliberately wrong current-password together with a valid, different new-password shows a red error banner reading exactly "A palavra-passe atual está incorreta." returned from the server; the success banner does not appear and all three fields remain populated and editable for a retry.'
    tags: [error-handling]
    judgment: false
  - id: bottom-link-voluntary
    area: 0
    mode: e2e
    enabled: true
    viewports: [desktop, mobile]
    state: default
    description: 'In the default (voluntary) state, the link at the bottom of the card reads "Voltar ao Dashboard" with a left-arrow icon and navigates to "/" when clicked, without requiring the form to be submitted.'
    tags: [navigation]
    judgment: false
  - id: unauthenticated-redirect
    area: 0
    mode: e2e
    enabled: true
    viewports: [desktop, mobile]
    state: logged-out
    description: 'Visiting /change-password directly while not authenticated (e.g. via the login page''s "Esqueceu-se da palavra-passe?" link, which points at this route) results in an automatic client-side redirect to /login instead of showing the change-password card - the route is not usable while logged out.'
    tags: [auth, navigation]
    judgment: false
  - id: logout-instead-forced
    area: 0
    mode: e2e
    enabled: true
    viewports: [desktop, mobile]
    state: forced
    description: 'In the forced state, the bottom-of-card element is a "Terminar sessao" text button (replacing the "Voltar ao Dashboard" link) that logs the user out and navigates to /login when clicked, without changing the password.'
    tags: [navigation]
    judgment: false
  - id: success-flow-forced-user
    area: 0
    mode: vision
    enabled: true
    viewports: [desktop, mobile]
    state: forced
    description: 'Completing the forced password change for the freshly-created throwaway user (valid current temp password, a new password meeting all 4 requirements and differing from the current one, matching confirm) replaces the subtitle/error area with a green success banner containing a check icon and the text "Palavra-passe alterada com sucesso. A redirecionar...", disables all form fields, and the app auto-navigates away (to "/") about 2 seconds later.'
    tags: [happy-path, destructive]
    judgment: false
  - id: mobile-card-layout
    area: 0
    mode: vision
    enabled: true
    viewports: [mobile]
    state: default
    description: 'At 375px width the card (max-width 420px) fills nearly the full viewport width with visible side padding; the three password fields, strength bar, requirements checklist and submit button stack in a single legible column with no horizontal scrolling, overlapping, or clipped text, and the hexagon watermark/glow backdrop remain visually subtle rather than overpowering the card.'
    tags: [responsive]
    judgment: false
  - id: field-labels-and-aria
    area: 0
    mode: e2e
    enabled: true
    viewports: [desktop, mobile]
    state: default
    description: 'Each password input has a visible <label> programmatically associated to it (matching htmlFor/id), and the confirm-password field sets aria-invalid and aria-describedby pointing at its mismatch error message when a mismatch is shown, so the error is exposed to assistive tech.'
    tags: [a11y]
    judgment: false
  - id: no-console-errors
    area: 0
    mode: e2e
    enabled: true
    viewports: [desktop, mobile]
    state: default
    description: 'The page produces zero browser console errors while idle, while typing into the form, and after a wrong-current-password submission, aside from known-benign favicon/React-DevTools messages - this route sits outside the (dashboard) group so it is not covered by the shared dashboard console-error assertion.'
    tags: [console]
    judgment: false
states:
  - id: forced
    label: Forced password change (new user first login)
    reachPath:
      - id: create-temp-user
        description: 'While logged in as the super-admin, go to /users, click "Adicionar Utilizador", fill in a new username, a temporary password, and role "user" (or "org-admin"), and submit - every user created this way is stored with passwordChangeRequired true.'
      - id: login-as-temp-user
        description: 'Log out of the admin session at /login, then sign in with the new username and the temporary password just set - the app detects passwordChangeRequired and redirects straight to /change-password instead of /chat.'
  - id: logged-out
    label: Route visited without an authenticated session
    reachPath:
      - id: visit-without-auth
        description: 'From a fresh session with no auth token (e.g. clear storage or use a private/incognito context), either open /change-password directly or go to /login and click the "Esqueceu-se da palavra-passe?" link, which points at this route.'
