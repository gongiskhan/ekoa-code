      /home/ggomes/.garrison-codex/automations/runs/01KXRXBD4WFMAC3H1SDHQ25Y8M/evidence/step-003.jpg
    referenceSource:
      runId: 01KXRXBD326DSHBR2D85ANWK7A
      stepId: table-empty-state
      viewportId: desktop
